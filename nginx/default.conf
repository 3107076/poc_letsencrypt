# HTTP :80 — serve la challenge ACME e reindirizza il resto a HTTPS
server {
    listen 80;
    server_name poc.local;

    # Token della challenge HTTP-01 scritti da lego nel volume condiviso /webroot
    location /.well-known/acme-challenge/ {
        root /webroot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — serve la dashboard + il certificato emesso via ACME (reload a caldo alla rotazione)
server {
    listen 443 ssl;
    server_name poc.local localhost;

    ssl_certificate     /certs/certificates/poc.local.crt;
    ssl_certificate_key /certs/certificates/poc.local.key;

    # Dashboard statica (HTML/CSS/JS inline) inclusa nell'immagine
    root /usr/share/nginx/html;
    index index.html;

    # Dati dinamici scritti dal container acme nel volume condiviso /web
    location /api/ {
        alias /web/;
        default_type application/json;
        add_header Cache-Control "no-store";
        # status.json puo' non esistere prima della prima emissione: niente errori nei log
        log_not_found off;
    }

    # Bottone "Forza rinnovo": inoltra al listener del container acme (solo POST).
    # resolver + variabile = risoluzione DNS a runtime (nginx non fallisce se acme parte dopo).
    location = /api/renew {
        limit_except POST { deny all; }
        resolver 127.0.0.11 valid=10s;
        set $acme_upstream http://acme:8080;
        proxy_pass $acme_upstream;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
